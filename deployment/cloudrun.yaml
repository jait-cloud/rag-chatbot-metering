apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rag-metering
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Scale configuration
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        # Wait until the index is loaded before serving (~8 s worst case)
        run.googleapis.com/startup-cpu-boost: "true"
        # VPC connector needed to reach Memorystore Redis
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/europe-west1/connectors/rag-vpc-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: gcr.io/PROJECT_ID/rag-metering:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: REDIS_URL
              value: "redis://10.0.0.3:6379/0"   # Memorystore private IP
            - name: LLM_MODEL
              value: "claude-sonnet-4-5"
            - name: LOG_LEVEL
              value: "INFO"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: latest
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 3
